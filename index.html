<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Our Quotes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>Our Quotes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.5.13/vue.global.prod.min.js"></script>
  <script>
    if (typeof Vue === 'undefined') {
      document.write('<script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"><\/script>');
    }
  </script>
  <style>
/* ── DESIGN TOKENS ── */
:root {
  --bg:          #0d0f1a;
  --bg2:         #111320;
  --panel:       #141728;
  --card:        #1a1e30;
  --surface:     #161a2e;
  --border:      #252a42;
  --border-glow: #7c6af744;

  --accent:      #7c6af7;
  --accent-dim:  #7c6af733;
  --accent-glow: 0 0 20px #7c6af755, 0 0 60px #7c6af722;
  --green:       #4ade80;
  --amber:       #fbbf24;
  --pink:        #f472b6;
  --cyan:        #22d3ee;

  --text:        #e2e0f0;
  --text-mid:    #8b8fac;
  --text-dim:    #4a4f6a;

  --font-mono:   'JetBrains Mono', 'Courier New', monospace;
  --font-body:   'DM Sans', system-ui, sans-serif;

  --radius:      14px;
  --radius-sm:   8px;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overscroll-behavior: none; }
* { -webkit-user-select: none; user-select: none; }
input, textarea { -webkit-user-select: text; user-select: text; }

html {
  height: 100%;
  height: -webkit-fill-available;
}
body {
  height: 100%;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  font-family: var(--font-mono);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* Scanline texture overlay — subtle, low perf impact */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.015) 2px,
    rgba(0,0,0,0.015) 4px
  );
  pointer-events: none;
  z-index: 100;
  will-change: auto;
}

/* ── LAYOUT ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  height: -webkit-fill-available;
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(var(--safe-top) + 14px) 18px 14px;
  background: rgba(13,15,26,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

.app-name {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.app-name::before {
  content: '// ';
  color: var(--text-dim);
  font-weight: 300;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-fav-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 11px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s;
}
.btn-fav-header:active { border-color: var(--accent); }
.btn-fav-header-icon {
  font-size: 15px;
  line-height: 1;
}
.btn-fav-header-label {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-dim);
  letter-spacing: 0.5px;
  white-space: nowrap;
}
#fav-count-badge {
  color: var(--accent);
  font-weight: 600;
}

.icon-btn {
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-mid);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: border-color 0.15s, color 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  font-family: var(--font-mono);
}
.icon-btn:active { transform: scale(0.9); border-color: var(--accent); color: var(--accent); }

/* ── SCREENS ── */
.screens-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}
.screen {
  display: flex;
  flex-direction: column;
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.22s ease, visibility 0.22s;
  will-change: opacity;
}
.screen.active {
  opacity: 1;
  visibility: visible;
  z-index: 1;
}

    /* ── SECTION TABS (top-level section switcher) ── */
    .section-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(13,15,26,0.97);
      padding: calc(var(--safe-top) + 4px) 0 0;
      flex-shrink: 0;
    }
    .section-tab {
      flex: 1;
      padding: 10px 8px 8px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .section-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .section-tab-icon { font-size: 14px; }
    .section-tab-label { font-size: 10px; }

    /* ── SECTION VIEW ── */
    .section-view {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* When section tabs exist, header doesn't need safe-top */
    .section-tabs + .section-view .header {
      padding-top: 10px;
    }

/* ── QUOTE SCREEN ── */
#screen-quote {
  padding: 0;
  justify-content: space-between;
}

/* ── QUOTE AREA : layout fixe en 3 zones ── */
.quote-area {
  flex: 1;
  display: grid;
  grid-template-rows: 1fr auto;
  gap: 0;
  padding: 28px 22px 16px;
  min-height: 0;
  position: relative;
}

/* Coins décoratifs fixes */
.quote-area::before, .quote-area::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-color: var(--border-glow);
  border-style: solid;
  pointer-events: none;
}
.quote-area::before { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
.quote-area::after  { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

/* Zone haute : numéro de phrase (fixe) */
.quote-line-num {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
  font-family: var(--font-mono);
}

/* Zone centrale : " + texte (scrollable si nécessaire) */
.quote-center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
  overflow: hidden;
}

.quote-mark {
  font-family: var(--font-mono);
  font-size: 48px;
  line-height: 0.7;
  color: var(--accent-dim);
  margin-bottom: 14px;
  display: block;
  font-weight: 700;
  flex-shrink: 0;
}

.quote-text {
  font-family: var(--font-mono);
  font-size: clamp(15px, 4.5vw, 20px);
  line-height: 1.7;
  color: var(--text);
  font-weight: 300;
  font-style: italic;
  position: relative;
}

.cursor-blink {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  background: var(--accent);
  margin-left: 3px;
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Zone basse : auteur + badges (fixe) */
.quote-bottom {
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* Numéro au-dessus du séparateur, aligné à droite */
.quote-bottom .quote-line-num {
  text-align: right;
  padding-bottom: 6px;
  margin-bottom: 0;
}

/* Séparateur + contenu infos */
.quote-bottom-inner {
  padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.quote-meta {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.meta-author {
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}
.meta-author::before { content: '> '; color: #ffffff; }

.meta-secondary {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-family: var(--font-mono);
}

.meta-secondary span { display: flex; align-items: center; gap: 4px; }
.meta-secondary span::before { content: '—'; color: var(--text-dim); opacity: 0.4; }

/* ── CHIPS AREA ── */
.chips-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-start;
  min-height: 28px; /* réserve de la hauteur même vide */
}

/* Animation de transition entre phrases */
@keyframes quoteOut {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-6px); }
}
@keyframes quoteIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.quote-center.exiting, .quote-bottom.exiting {
  animation: quoteOut 0.18s ease-in forwards;
}
.quote-center.animating { animation: quoteIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards; }
.quote-bottom.animating { animation: quoteIn 0.3s cubic-bezier(0.22,1,0.36,1) 0.05s both; }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 12px;
  font-weight: 400;
  font-family: var(--font-mono);
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.3px;
}
.chip::before { content: '['; color: var(--text-dim); }
.chip::after  { content: ']'; color: var(--text-dim); }
.chip.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}
.chip.active::before, .chip.active::after { color: var(--accent); }

/* ── BADGES TOUJOURS VISIBLES (catégorie + alcool) ── */
.info-badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: var(--font-mono);
  font-weight: 500;
  letter-spacing: 0.3px;
  border: 1px solid var(--border);
}
.cat-badge {
  background: #6d1a2a18;
  color: #c0506a;
  border-color: #6d1a2a55;
}
.alc-badge.yes {
  background: #fbbf2414;
  color: var(--amber);
  border-color: #fbbf2440;
}
.alc-badge.no {
  background: #4ade8012;
  color: var(--green);
  border-color: #4ade8035;
}

/* ── DETAILS PANEL ── */
.details-panel {
  display: none;
  flex-direction: column;
  gap: 8px;
  padding: 10px 0 0;
  animation: fadeIn 0.2s ease;
}
.details-panel.open { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.detail-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 12px;
  font-family: var(--font-mono);
  line-height: 1.5;
}
.detail-label {
  color: #ffffff;
  flex-shrink: 0;
  font-size: 11px;
}
.detail-label::after { content: ':'; }
.detail-value { color: var(--text-mid); }

.alcohol-badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.alcohol-badge.yes { background: #fbbf2422; color: var(--amber); border: 1px solid #fbbf2444; }
.alcohol-badge.no  { background: #4ade8022; color: var(--green);  border: 1px solid #4ade8044; }

.vol-badge {
  background: #22d3ee18;
  color: #22d3ee;
  border: 1px solid #22d3ee33;
}

/* ── BOTTOM ACTION BAR ── */
.bottom-bar {
  padding: 12px 16px calc(var(--safe-bottom) + 12px);
  display: flex;
  gap: 10px;
  align-items: center;
  border-top: 1px solid var(--border);
  background: rgba(13,15,26,0.95);
  backdrop-filter: blur(12px);
  flex-shrink: 0;
}

.btn-random {
  flex: 1;
  padding: 14px;
  border-radius: var(--radius);
  border: 1px solid var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.15s;
  box-shadow: var(--accent-glow);
  -webkit-tap-highlight-color: transparent;
}
.btn-random::before { content: ''; }
.btn-random:active {
  transform: scale(0.98);
  background: var(--accent);
  color: var(--bg);
}

.btn-fav {
  width: 48px; height: 48px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.btn-filter-toggle {
  width: 48px; height: 48px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-mid);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.btn-fav .fav-icon { font-size: 22px; line-height: 1; }
.btn-fav.pop .fav-icon {
  animation: favPop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.49);
}
@keyframes favPop {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.5); }
  60%  { transform: scale(0.85); }
  100% { transform: scale(1); }
}
.btn-fav:active, .btn-filter-toggle:active { transform: scale(0.95); }
.btn-fav.active { border-color: #f472b644; background: #f472b611; color: #f472b6; }
.btn-filter-toggle .filter-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; }
.btn-filter-toggle.active {
  border-color: var(--accent);
  color: var(--accent);
}


/* ── FILTER SCREEN ── */
#screen-filter { padding: 18px; gap: 18px; }

.filter-section { display: flex; flex-direction: column; gap: 8px; }

.filter-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: var(--font-mono);
}
.filter-title::before { content: '// '; color: var(--border); }

.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; }

.filter-search-wrap {
  position: relative;
  width: 100%;
}
.filter-search-wrap::before {
  content: '🔍';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  opacity: 0.5;
  pointer-events: none;
}
.filter-input {
  width: 100%;
  padding: 12px 14px 12px 38px;
  border-radius: 24px;
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text);
  background: rgba(0,0,0,0.25);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  caret-color: var(--accent);
}
.filter-input::placeholder { color: var(--text-dim); font-size: 11px; }
.filter-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-dim);
  background: rgba(0,0,0,0.35);
}

.filter-separator {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
  flex-shrink: 0;
}



/* ── FILTER OVERLAY ── */
.filter-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.18);
  z-index: 100;
  backdrop-filter: blur(4px);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s ease;
}
.filter-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

/* Le panneau occupe 65vh max, slide up/down */
.filter-menu {
  width: 100%;
  max-width: 480px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 18px 18px 0 0;
  display: flex;
  flex-direction: column;
  height: 65vh;
  transform: translateY(100%);
  transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
  will-change: transform;
  touch-action: none;
}
.filter-overlay.open .filter-menu {
  transform: translateY(0);
}

/* Header fixe en haut, ne scroll pas */
.filter-menu-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
}

.filter-count-txt {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}

.filter-reset {
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.filter-reset:hover { border-color: var(--border); color: var(--text-dim); }
.filter-reset:active { border-color: var(--border); color: var(--text-dim); }
.filter-reset.has-filters { border-color: #e05575; color: #e05575; }
.filter-reset.has-filters:hover { background: #e0557520; border-color: #e05575; color: #e05575; }

/* Body scrollable — prend tout l'espace restant */
.filter-menu-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 10px 14px calc(var(--safe-bottom) + 24px);
  display: flex;
  flex-direction: column;
  gap: 10px;
  /* On laisse les enfants définir leur propre hauteur — pas de overflow:hidden sur eux */
}

/* ── CATÉGORIES PLIABLES ── */
.filter-cat-section {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  flex-shrink: 0;
  contain: layout style;
}

.filter-cat-toggle {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
  background: var(--panel);
  border: none;
  border-radius: var(--radius-sm);
  color: var(--text-mid);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s, background 0.15s;
  letter-spacing: 0.3px;
}
.filter-cat-toggle:active { color: var(--accent); }
.filter-cat-toggle.has-active { color: var(--accent); background: var(--accent-dim); }
.filter-cat-toggle.open { border-radius: var(--radius-sm) var(--radius-sm) 0 0; }

.filter-cat-arrow {
  font-size: 10px;
  transition: transform 0.2s;
  color: var(--text-dim);
  flex-shrink: 0;
}
.filter-cat-toggle.open .filter-cat-arrow { transform: rotate(90deg); }

/* Contenu pliable — grid-template-rows for smooth height animation */
.filter-collapsible {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.25s ease-out;
}
.filter-collapsible > .filter-chips-inner {
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 0 12px;
  background: var(--panel);
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
}
.filter-collapsible.open {
  grid-template-rows: 1fr;
}
.filter-collapsible.open > .filter-chips-inner {
  padding: 10px 12px 12px;
}


/* ── STATS SCREEN ── */
#screen-stats { padding: 18px; gap: 14px; }

/* Stats filter banner — bottom only */
.stats-banner-bottom {
  position: fixed;
  left: 50%;
  bottom: calc(var(--safe-bottom) + 70px);
  z-index: 200;
  background: rgba(13,15,26,0.5);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid #e05575;
  color: #e05575;
  padding: 9px 18px;
  border-radius: var(--radius);
  font-size: 11px;
  font-family: var(--font-mono);
  font-weight: 500;
  letter-spacing: 0.5px;
  white-space: nowrap;
  box-shadow: 0 0 10px rgba(224,85,117,0.15);
  pointer-events: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transform: translateX(-50%) translateY(20px);
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.stats-banner-bottom.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
  pointer-events: auto;
}
.stats-banner-bottom:active {
  transform: translateX(-50%) scale(0.95);
}

.chart-empty {
  text-align: center;
  padding: 28px 12px;
  color: var(--text-dim);
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}
.chart-empty::before {
  content: '◌';
  display: block;
  font-size: 22px;
  margin-bottom: 8px;
  opacity: 0.35;
}

.stat-grid-2 {
  grid-template-columns: 1fr 1fr;
}

/* Phrase du jour — clickable item in stats */
.stat-daily-item {
  padding: 10px 12px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: background 0.15s;
}
.stat-daily-item:active { background: rgba(124,106,247,0.08); }
.stat-daily-quote {
  font-family: var(--font-body);
  font-size: 13px;
  font-style: italic;
  font-weight: 300;
  color: var(--text);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.stat-daily-author {
  font-size: 11px;
  color: var(--accent);
  font-family: var(--font-mono);
  margin-top: 6px;
}
.stat-daily-author span { color: var(--text-dim); }
.stat-daily-empty {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.stat-daily-empty .daily-send-btn {
  flex-shrink: 0;
  background: none;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: 0.3px;
}
.stat-daily-empty .daily-send-btn:active { opacity: 0.7; }

/* Section separators */
.stats-section-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2.5px;
  font-family: var(--font-mono);
  padding: 8px 0 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.stats-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.stats-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
}

.stats-card-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  margin-bottom: 14px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-family: var(--font-mono);
}
.stats-card-title::before { content: '// '; color: var(--border); }

/* Overview: hero stat full width + 3 cols */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.stat-mini {
  background: rgba(0,0,0,0.2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 10px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.stat-mini.hero {
  grid-column: 1 / -1;
  padding: 18px 14px;
  background: rgba(124,106,247,0.06);
  border-color: rgba(124,106,247,0.2);
  justify-content: center;
}
.stat-mini.hero .num {
  font-size: 36px;
}
.stat-mini .num {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  font-family: var(--font-mono);
  line-height: 1.2;
  word-break: break-word;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 0;
}
.stat-mini .lbl {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 6px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: var(--font-mono);
  flex-shrink: 0;
}

/* Per-chart type heights */
canvas.chart-canvas { max-height: 220px; }
#chart-cats { max-height: 240px; margin-top: 8px; }
#chart-hours { max-height: 180px; }
#chart-locations { max-height: 240px; }



/* ── HISTORY SCREEN ── */
#screen-history { padding: 18px; gap: 10px; }
#history-list {
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Swipe wrapper */
.history-swipe {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius-sm);
}
/* Swipe background layers */
.history-swipe-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  padding: 0 18px;
  font-size: 13px;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
  pointer-events: none;
}
.history-swipe-bg.bg-fav {
  background: rgba(244,114,182,0.12);
  justify-content: flex-start;
  color: #f472b6;
}
.history-swipe-bg.bg-del {
  background: rgba(239,68,68,0.12);
  justify-content: flex-end;
  color: #ef4444;
}

.history-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  cursor: pointer;
  position: relative;
  transition: transform 0.2s ease, opacity 0.3s;
  touch-action: pan-y;
}
/* Premier item — accent border */
.history-item[data-rank="0"] { border-color: rgba(124,106,247,0.3); }
/* Favori — subtle left accent bar */
.history-item.is-fav { border-left: 3px solid #f472b6; }

.history-item:active { border-color: var(--accent); opacity: 1; }
.history-item-body { flex: 1; min-width: 0; }
.history-quote {
  font-family: var(--font-body);
  font-size: 14px;
  font-style: italic;
  font-weight: 300;
  color: var(--text);
  line-height: 1.6;
}
.history-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 6px;
  gap: 6px;
}
.history-author {
  font-size: 12px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
  flex: 1;
  min-width: 0;
}
.history-author-arrow { color: var(--accent); margin-right: 2px; }
.history-time {
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  opacity: 0.6;
  white-space: nowrap;
  flex-shrink: 0;
}
.history-cat-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  background: #6d1a2a18;
  color: #c0506a;
  border: 1px solid #c0506a33;
  font-style: normal;
  white-space: nowrap;
}
/* Swipe remove animation */
.history-swipe.removing {
  max-height: 200px;
  transition: max-height 0.3s ease, opacity 0.3s ease;
}
.history-swipe.removing.gone {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  margin: 0;
}
/* Empty state animation */
.empty-state .empty-icon {
  font-size: 40px;
  opacity: 0.5;
  animation: emptyPulse 3s ease-in-out infinite;
}
@keyframes emptyPulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.1); }
}


/* ── GAME SCREEN — quote-style layout ── */
#screen-game { padding: 0; gap: 0; display: flex; flex-direction: column; }
.game-score-card {
  display: flex; justify-content: space-around; align-items: center;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin: 12px 18px 0; padding: 10px 8px;
}
.game-score-item { text-align: center; }
.game-score-label {
  display: block; font-family: var(--font-mono); font-size: 9px;
  text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 2px;
}
.game-score-num { font-family: var(--font-mono); font-size: 16px; font-weight: 600; color: var(--text); }
.game-score-num.streak { color: #fbbf24; }
.game-score-num.best { color: var(--accent); }
.game-quote-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 28px 12px; text-align: center; min-height: 0;
}
.game-quote-area .quote-mark { font-size: 42px; line-height: 1; margin-bottom: 6px; }
.game-quote-text {
  font-family: var(--font-body); font-size: 17px; font-weight: 300;
  font-style: italic; color: var(--text); line-height: 1.65; margin: 0; max-width: 500px;
}
.game-quote-text .game-blank { color: var(--accent); border-bottom: 2px dashed var(--accent); padding: 0 6px; }
.game-answer-zone { padding: 10px 18px 16px; }
.game-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.game-choice {
  padding: 14px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: rgba(0,0,0,0.15);
  color: var(--text); font-family: var(--font-mono); font-size: 12px;
  cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.game-choice:active { transform: scale(0.96); }
.game-choice.correct { border-color: #4ade80; background: rgba(74,222,128,0.12); color: #4ade80; }
.game-choice.wrong { border-color: #ef4444; background: rgba(239,68,68,0.12); color: #ef4444; }
.game-choice.reveal { border-color: #4ade8066; color: #4ade80; }
.game-input-area { display: flex; gap: 10px; }
.game-input {
  flex: 1; padding: 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: rgba(0,0,0,0.2);
  color: var(--text); font-family: var(--font-mono); font-size: 13px;
  outline: none; -webkit-user-select: text; user-select: text;
}
.game-input:focus { border-color: var(--accent); }
.game-input::placeholder { color: var(--text-dim); }
.game-validate-btn {
  padding: 12px 18px; border-radius: var(--radius-sm);
  border: 1px solid var(--accent); background: var(--accent-dim);
  color: var(--accent); font-family: var(--font-mono); font-size: 11px;
  cursor: pointer; white-space: nowrap;
}
.game-reveal { padding: 0 18px 14px; }
.game-result-badge { text-align: center; font-family: var(--font-mono); font-size: 13px; line-height: 1.5; margin-bottom: 14px; }
.game-result-badge .answer { color: #4ade80; font-style: italic; }
.game-result-badge .label { color: var(--text-dim); }
.game-reveal-bottom { border-top: 1px solid var(--border); padding-top: 10px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.game-next-btn {
  width: 100%; padding: 0 14px; height: 44px; border-radius: var(--radius);
  border: 1px solid var(--accent); background: transparent;
  color: var(--accent); font-family: var(--font-mono); font-size: 11px;
  font-weight: 500; letter-spacing: 0.5px; cursor: pointer;
}
.game-next-btn:active { background: var(--accent); color: var(--bg); }
.game-mode-bar {
  display: flex; gap: 0; border-top: 1px solid var(--border);
  padding: 8px 18px calc(8px + var(--safe-bottom));
  background: rgba(13,15,26,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.game-mode-btn {
  flex: 1; padding: 10px 12px; border: 1px solid var(--border); background: var(--card);
  color: var(--text-dim); font-family: var(--font-mono); font-size: 11px;
  cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.game-mode-btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); border-right: none; }
.game-mode-btn:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.game-mode-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* ── SHARE BUTTON ── */
.btn-share {
  width: 44px; height: 44px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
  transition: border-color 0.15s;
}
.btn-share:active { border-color: var(--accent); }


/* ── BOTTOM NAV ── */
.bottom-nav {
  display: flex;
  border-top: 1px solid var(--border);
  background: rgba(13,15,26,0.97);
  padding-bottom: max(4px, calc(var(--safe-bottom) - 12px));
  flex-shrink: 0;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 0 8px;
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.nav-btn .nav-icon { font-size: 18px; line-height: 1; }
.nav-btn.active { color: var(--accent); }
.nav-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 25%; right: 25%;
  height: 2px;
  background: var(--accent);
  border-radius: 1px;
  box-shadow: 0 0 8px var(--accent);
}


/* ── EMPTY STATE ── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-dim);
  padding: 40px;
  text-align: center;
  font-family: var(--font-mono);
}
.empty-state .empty-icon { font-size: 40px; opacity: 0.5; }
.empty-state p { font-size: 12px; line-height: 1.8; }

/* ── MODAL / SHEET ── */
.sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.18);
  z-index: 100;
  backdrop-filter: blur(4px);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s ease;
}
.sheet-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.sheet {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 18px 18px 0 0;
  padding: 18px 18px calc(var(--safe-bottom) + 22px);
  transform: translateY(100%);
  transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
  will-change: transform;
  max-height: 65vh;
  display: flex;
  flex-direction: column;
  touch-action: none;
}
.sheet-overlay.open .sheet {
  transform: translateY(0);
}

@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.sheet-handle {
  width: 32px; height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin: 14px auto 10px;
  cursor: grab;
}

.sheet-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: var(--font-mono);
  margin-bottom: 14px;
}
.sheet-title::before { content: '// '; color: var(--border); }

.sheet-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
  overflow-y: auto;
}

.sheet-item {
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 13px;
  font-family: var(--font-body);
  font-style: italic;
  font-weight: 300;
  cursor: pointer;
  transition: all 0.12s;
  line-height: 1.5;
  color: var(--text);
}
.sheet-item:active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* ── DATA LOAD SCREEN ── */
.load-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  padding: 32px 24px;
  text-align: center;
}

.load-title {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: var(--font-mono);
}
.load-title::before { content: '// '; color: var(--border); }

.load-spinner {
  display: none;
}

.skeleton-quote {
  width: 100%;
  max-width: 340px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 0 24px;
}
.skeleton-bar {
  height: 14px;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--border) 25%, var(--card) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: skeletonShimmer 1.5s ease infinite;
}
.skeleton-bar:nth-child(1) { width: 90%; }
.skeleton-bar:nth-child(2) { width: 75%; }
.skeleton-bar:nth-child(3) { width: 60%; }
.skeleton-bar:nth-child(4) { width: 40%; margin-top: 8px; height: 10px; opacity: 0.5; }
@keyframes skeletonShimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
.toast {
  position: fixed;
  top: calc(var(--safe-top) + 62px);
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: #1e2140;
  border: 1px solid var(--accent);
  color: var(--text);
  padding: 9px 18px;
  border-radius: var(--radius);
  font-size: 11px;
  font-family: var(--font-mono);
  font-weight: 500;
  letter-spacing: 0.5px;
  opacity: 0;
  transition: opacity 0.25s ease, transform 0.25s ease;
  pointer-events: none;
  white-space: nowrap;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,0.45), 0 0 10px var(--accent-dim);
}
.toast::before { content: '> '; color: var(--accent); font-weight: 700; }
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── POPUP SYSTEM (shared overlay + cards) ── */
.popup-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.popup-overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.popup-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 18px 18px 14px;
  max-width: 310px;
  width: calc(100% - 48px);
  transform: scale(0.92) translateY(10px);
  transition: transform 0.3s ease;
}
.popup-overlay.show .popup-card {
  transform: scale(1) translateY(0);
}
.popup-card .popup-text {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 300;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 14px;
}
.popup-card .popup-text strong {
  color: var(--accent);
  font-weight: 500;
}
.popup-card .popup-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

  60%      { transform: translate(-1px, 2px); }

function parseDate(str) {
  if (!str) return null;
  str = String(str).trim();
  let m;
  m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})[\s,T](\d{2}):(\d{2})/);
  if (m) return new Date(+m[3], +m[2] - 1, +m[1], +m[4], +m[5]);
  m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
  m = str.match(/^(\d{1,2})[-.](\d{1,2})[-.](\d{4})(?:[\s,T](\d{2}):(\d{2}))?/);
  if (m) return new Date(+m[3], +m[2] - 1, +m[1], +(m[4] || 0), +(m[5] || 0));
  m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,3})(?:[\s,T](\d{2}):(\d{2}))?/);
  if (m) return new Date(+m[1], +m[2] - 1, +m[3], +(m[4] || 0), +(m[5] || 0));
  if (/^\d{5}(\.\d+)?$/.test(str)) {
    const epoch = new Date(1899, 11, 30);
    return new Date(epoch.getTime() + parseFloat(str) * 86400000);
  }
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

function formatDate(str) {
  const d = parseDate(str);
  if (!d) return str;
  return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return "à l'instant";
  if (diff < 3600) return Math.floor(diff / 60) + ' min';
  if (diff < 86400) return Math.floor(diff / 3600) + ' h';
  return Math.floor(diff / 86400) + ' j';
}

let _toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

 1", "date": "", "q": "Jésus marchait sur l’eau, moi je cours sur la bière", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "En parlant des fesses : le petit bourrelet ou tu fous les doigts", "name": "Yannis. K", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Mec comment t’arrives a mieux parler à ma meuf que moi ?", "name": "Pierre. C", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "À ma mère : non je suis désolé, mais c’est toi qui est morte", "name": "Noémie. C", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Mais c'est pas parce que j'ai tort que t'as raison d'accord ?", "name": "Adrien. V", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Lui c’est l’Odyssée de Py, et y’a même pas le Tigre", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Bien bourré...[insérer action débile]", "name": "Antoine. G", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Un esprit moyen dans un corps qui craint", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Plaisir d’offrir, joie de décevoir", "name": "Antoine. G", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Parlant d’une bière : Elle pourrait être plus fraîche mais elle est bonne", "name": "Brian. B", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Eh t’es vachement bien conservée (Brian) ; en même temps du thon en boîte ça se conserve longtemps (Alex)", "name": "Brian. B / Alex. P", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "C’est pas le cul qui compte, c’est ce qu’il y’a à l’intérieur", "name": "Noémie. C", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Ce qui est important, c’est pas le nombre de meufs que tu as baisé. C’est de baiser.", "name": "Brian. B", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Ah non mais c'est insta ça compte pas mec, elle ressemble pas à ça quand tu la ken", "name": "Brian. B", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Corrigerais = conditionnel. Ex : Je corrigerais NREC si j'étais encore président. Corrigerai = futur. Ex : Je corrigerai mon date avec une fessée", "name": "Brian. B", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Tu veux un nuggets dans le cul ?", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Si t’es un vainqueur, t’en ressort bourré", "name": "Vincent T. (emlyon)", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Il a une chatte tellement énorme que ça me ferait changer de bord", "name": "Arthur. P (emlyon)", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Tu fais pire que mieux", "name": "Aline. S", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Je bandes facilement sur une meuf dégueu", "name": "Romain. F", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Le premier truc que tu regarde un lendemain matin, c’est la hauteur de son slip", "name": "Romain. F", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "D’habitude, je regarde que les décolletés. Si j’arrive à la regarder dans les yeux, c’est qu’elle a plus de charisme qu’une grosse pute", "name": "Alban. G (emlyon)", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Y’a 2 choses que j'aime pas dans la vie, les gosses et les cunnis", "name": "Anatole. D (emlyon)", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "On ne joue pas avec les PD, c’est les PD qui se jouent de vous [BONUS : j’espère ne pas rentrer que dans la note]", "name": "Aymeric. T (GEM)", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Est-ce que vous préférez vous prendre un coup de boule au singulier ou au pluriel ?", "name": "(Aymeric. T GEM)", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "Mention Honorifique", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "C’est pas parce que t’es loin du pot que tu tournes pas autour", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Ça dépend de l’état d’esprit, mais surtout de l’état de sa chatte", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Alex a Élise : tu kifferais pas qu’on ramène un bouquet une fois pour le geste ? Élise : Ouais non je lui dirais ramène moi un kebab", "name": "Élise (Unknown)", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "C’était recent ? : Non elle mettait pas les dents", "name": "Romain. F", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "J'adore le racisme en 3D", "name": "Hugo. C", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Sacré inflation du gras dans tes fesses cette année", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "J'ai fait l'infirmière, je t'ai ramené des frites", "name": "Thibaud (Unknown)", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "La meuf est myope même dans son cerveau", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Un immigré blanc / de l’hémisphère nord, on appelle ça un expat", "name": "Andrew. W", "loc": "No data - bug an 2000", "cat1": "Raciste", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "J'avais 10 ans, j'étais en chien", "name": "Pauline. J", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "C’est la femme de ma vie, mais je meurs demain", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Aspirer à la vie en costume, pour se faire aspirer en costume", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Entre le 6 pack et le fut y'a une différence", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Les 1 premiers arrivé seront servis", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Le plaisir de ne pas venir", "name": "Raïssa. M", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "J’ai déjà mangé un caillou plus mou", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Rien ne sert de courir, si t’es pas capable de courir", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Un riche peut avoir ta coupe, mais tu peux pas avoir la coupe d’un riche sans l’être", "name": "Andrew. W", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Je me suis tâté à venir à moitié à poil aujourd’hui, mais vas-y flemme", "name": "Sarah Al. F", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Un bon EPHAD, c’est un EPHAD sur une falaise", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "J’aurais du t’écouter quand tu me parles pas", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Elle a des gros seins, mais pas tellement si tu fais le ratio avec son corps", "name": "Thomas. M", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "J’ai pas une dose de sociabilité illimitée", "name": "Sarah Al. F", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Tu peux pas planifier ta vie en disant [ imagine je meurs demain ]. Mais en même temps, imagine tu meurs demain.", "name": "Vincent. R", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Faut pas juger un livre à sa couverture, mais la c’est clairement un dictionnaire Larousse", "name": "Jilian Strenk", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Je vais braquer des banques et puis je vais ken", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Vaut mieux pas avoir de juif que de prix Nobel", "name": "Thomas. M", "loc": "No data - bug an 2000", "cat1": "Raciste", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "L’OL, quelle merveilleuse raison d’être malheureux", "name": "Simon. T (emlyon)", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "On s’en fout que les chinois soient sous l’eau, si il fait 2 degrés de plus chez nous on mettra la Clim", "name": "Thomas. M", "loc": "No data - bug an 2000", "cat1": "Raciste", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Tu m’aurais dit c’est le nom du trou c’est pareil", "name": "Antoine. G", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Je suis la clef de voûte de la merde", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Aspirer à la vie en costume pour se faire aspirer en costume, mais attention à ne pas se faire aspirer par le costume", "name": "Thomas. M", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Solide sur les appuis, flexible sur le vomi", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Tout mon corps est une couille (en sortant du bain)", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Le résumé de ma vie : l’ambition mais pas le niveau", "name": "Antoine. G", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "C’est quand même plus facile quand t’es pas bourré", "name": "Sarah Al. F", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "On est pas bizarre, on est juste con", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "T’as été précis sur ce que tu visais pas", "name": "Thomas. M", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "C’est comme un tiroir à épices, mais avec des gens", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Elle a envoyé ça parce qu’elle veut sucer la bite de mon père", "name": "Brian. B", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Boire un peu tous les soirs, c’est comme boire beaucoup tous les samedis", "name": "Andrew. W", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "Mention Honorifique", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Quand t’as une petite queue, faut utiliser ta tête", "name": "Brian. B", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "Mention Honorifique", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "J’étais James Bond pour la tringler", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "A chaque fois que je vois de l’alcool je suis trop refait", "name": "Andrew. W", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Venez pas comme vous êtes. Éric Zemmour.", "name": "Thomas. M", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Une Fiak Multipla", "name": "Thomas. M", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "La meilleure façon de ne pas baisser les bras, c’est de lever le coude", "name": "Adrien. N", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Dans 10 ans tu te tapes une hôtesse de l’air, et c’est toi l’avion", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Pourquoi
