surde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "La bague t’es pas obligée mais le doigt…", "name": "Pierre. C", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Bonjour. Ah non c’est bon je l’ai déjà dit plusieurs fois aujourd’hui", "name": "Inconnu boulangerie Paris (Unknown)", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Putain encore un des désavantages d’être riche", "name": "Adrien. N", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Y’a plus de chances qu’on retire le droit de vote aux femmes que j’arrête de galérer avec elles", "name": "Hugo. C", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "Mention Honorifique", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Ma vie est un GinTo de trop", "name": "Hugo. C", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Tous les peuples sont nés ivres et égaux en droit", "name": "Hugo. C", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "C’est bien de faire le mec détaché, mais c’est encore mieux de l’attacher", "name": "Adrien. V", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Jeudi en 8 je te plie en 4", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Je suis une meuf de 24 ans, heureusement que je suce des bites", "name": "Noémie. C", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Franchement les mecs un peu tendu faut leur grimper dessus", "name": "Noémie. C", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Imagine t’arrives au dîner de con et y’a qu’une chaise", "name": "Adrien. N", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "J’ai écouté qu’à moitié, j’aurais aimé ne rien écouter du tout", "name": "Adrien. N", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "Mention Honorifique", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Vendredi soir je préfère te parler ivre, je te parle trop sobre en ce moment", "name": "Adrien. N", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "J’ai pas encore fini d’être bourré", "name": "Christina. F", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Faut que je fasse du tartare avec mon foie", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Je veux pas que t’aies des amis, je veux que tu baises", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Donne moi un taz, j’en fait ma femme", "name": "Adrien. N", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Je suis un FlixBus des cul secs. Je prends 29h mais j’arrive à destination", "name": "Adrien. N", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Écrit un film de cul humoristique, genre tu te tapes une queue et en même temps tu te tapes des barres", "name": "Diane. B", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Mec ton EVG si tu survis c’est que je l’ai raté", "name": "Adrien. N", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "Mention Honorifique", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Faut que je me trouve un plan Q", "name": "Sam. R", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "T’es attentes ne sont pas assez basses", "name": "Antoine. G", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Autant y’a des portes de sorties c’est parfois des portes d’entrées, mais parfois faut que ça reste des portes de sorties", "name": "Antoine. G", "loc": "No data - bug an 2000", "cat1": "absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "C’est pas le pingouin qui glisse le plus loin", "name": "Christina. F", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "C’est injuste j’ai encore la tête en pain burger, et toi tu vas bien", "name": "Adrien. N", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Un obèse quand il est surpris, il dit le gras m’en tombe", "name": "Adrien. N", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Il n’a rien mais il le mérite", "name": "Jordan. C", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "Mention Honorifique", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Si tu vomis pas sur ma tombe en célébrant, c’est que y’a un problème", "name": "Adrien. N", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "La vie c’est comme une boîte de chocolat, t’es à la moitié et t’as déjà envie de vomir", "name": "Adrien. N", "loc": "No data - bug an 2000", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "J’ai faim d’ivresse, rendez-moi caisse", "name": "Alex. P", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Avant de voir la teub, tu vois la gueule", "name": "Diane. B", "loc": "No data - bug an 2000", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "A chaque soirée j’ai vu le jour", "name": "Marguerite. H", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Je pourrais avoir un orgasme avec du pain chaud", "name": "Marguerite. H", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 1", "date": "", "q": "Je suis pas là pour réussir, je suis là pour vivre", "name": "Marguerite. H", "loc": "No data - bug an 2000", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "22/04/2024 18:43", "q": "Quand ton manteau est moche mais que c’est fait exprès, c’est que t’as beaucoup d’argent", "name": "Alex. P", "loc": "Paris", "cat1": "Neutre", "cat2": "Beauf", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "22/04/2024 14:10", "q": "Si j’avais plus de couilles je pense que je serais un énorme charro", "name": "Samuel. R", "loc": "Paris", "cat1": "Beauf", "cat2": "Mention Honorifique", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "14/04/2024 23:10", "q": "Catho.com : faites une croix sur votre célibat", "name": "Alex. P", "loc": "Paris", "cat1": "Neutre", "cat2": "Mention Honorifique", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "13/04/2024 23:32", "q": "Mon feed Instagram ne te fait pas perdre de neurones, juste après ils couchent entre eux", "name": "Alex. P", "loc": "Paris", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "12/04/2024 20:19", "q": "J’ai pas besoin de costume mais je me ferais bien un trois pièces", "name": "Samuel. R", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Je me fais plus d'injure en mentant que je n'en fais à celui à qui je mens", "name": "Michel de Montaigne", "loc": "", "cat1": "Classy", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "L'humour est la politesse du désespoir", "name": "Chris Marker", "loc": "", "cat1": "Classy", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Happiness in intelligent people is the rarest thing I know", "name": "Ernest Hemingway", "loc": "", "cat1": "Classy", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "13/02/2024 16:41", "q": "D’un point de vue grammaticalement correct, elle est bonne sa mère", "name": "Hugo. C", "loc": "Rio de Janeiro", "cat1": "Absurde", "cat2": "Beauf", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "13/02/2024 10:24", "q": "Elle a un fiak immense, tu rentre dedans, tu finis à Narnia", "name": "Alexandre. P", "loc": "Rio de Janeiro", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "13/02/2024 10:10", "q": "En fait, je suis fait pour boire dès 10h du matin, je comprends les alcooliques", "name": "Hugo. C", "loc": "Rio de Janeiro", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "11/02/2024 23:13", "q": "l’Adderall si tu bois assez ça annule", "name": "Jean-Maxime, cousin Jeanjean", "loc": "Rio de Janeiro", "cat1": "Neutre", "cat2": "Mention Honorifique", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "11/02/2024 00:19", "q": "Si je nique la grosse, j’ouvre un tik tok", "name": "Jean-Maxime, cousin Jeanjean", "loc": "Rio de Janeiro", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "07/02/2024 20:07", "q": "Si des pères baisent des sœurs, c’est en Franche-Compté que ça se passe", "name": "Hugo. C", "loc": "Rio de Janeiro", "cat1": "Absurde", "cat2": "Mention Honorifique", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "07/02/2024 18:40", "q": "Équilibrer son tableau de compta, c’est l’équivalent d’un petit shot poppy", "name": "Hugo. C", "loc": "Rio de Janeiro", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "06/02/2024 17:46", "q": "Je pense que mon fils sera raciste", "name": "Hugo. C", "loc": "6341 miles to Rio", "cat1": "Raciste", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "04/02/2024 19:14", "q": "Je crois que le Dom Pérignon Vintage 2008 c’est le seul champagne que je tolère", "name": "Elisa.P", "loc": "Lyon", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "04/02/2024 02:51", "q": "Y’a d’la meuf hein", "name": "Jordan.C", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "03/02/2024 09:37", "q": "Celui qui me met un doigt dans le cul se fait agresser au 3ème degré", "name": "Adrien.N", "loc": "Grenoble", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "31/01/2024 23:23", "q": "Ça peut pas être l’Algérie, c’est de l’arabe noble", "name": "Maxime. L", "loc": "Paris", "cat1": "Raciste", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "20/01/2024 01:12", "q": "C’est un match entre deux Mitroglou, ça attaque mais personne ne marque", "name": "Alex. P", "loc": "Paris", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "19/01/2024 21:49", "q": "C’est sûr que je roulais à 20km/h parce que quand je t’ai vu j’ai vraiment pas flashé", "name": "Alex. P", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "17/01/2024 22:20", "q": "L’important c’est d’être bon à un moment, et ok le reste du temps", "name": "Alex. P", "loc": "Paris", "cat1": "Mention Honorifique", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "15/01/2024 21:52", "q": "C’est le lactose qui fait péter, et le gluten qui fait souffrir", "name": "Mégane. S", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "13/01/2024 01:30", "q": "Je ne veux pas me faire grand remplacer par des bourgeois", "name": "Adrien. N", "loc": "Paris", "cat1": "Raciste", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "12/01/2024 23:10", "q": "Le Maroc c’est le jardin de la France mais bien taillé", "name": "Pauline. J", "loc": "Paris", "cat1": "Raciste", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "12/01/2024 23:10", "q": "Je vise la lune pour tomber dans les étoiles mais là je tombe souvent dans la raie du plombier", "name": "Alex. p", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "12/01/2024 01:19", "q": "Moi je pense que je suis fait pour vivre tout nu", "name": "Hugo. C", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "12/01/2024 00:14", "q": "On dit que la première impression est la meilleure. Moi je pense que mes 5 premières sont mauvaise", "name": "Hugo. C", "loc": "Paris", "cat1": "Mention Honorifique", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Moi je cherche Alex avec une chatte", "name": "Adrien. N", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Sache que dès que tu penses à un faire un truc débile, ça a certainement déjà été fait quelque part dans le monde et 70% du temps par un Russe", "name": "Alex. P", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Je vais m’inscrire dans un club de boxe ils sont en manque de sacs de frappes en ce moment", "name": "Alex. P", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Je pense que t’inverse le n et le p de inspecteur dans la vraie vie", "name": "Adrien. N", "loc": "Paris", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "C’était un régal de regarder les gens de haut", "name": "Sam. R", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Il m’a beurré le coca", "name": "Alex. P", "loc": "Paris", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Je suis plus fort en maths quand je suis bourré", "name": "Alex. P", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Laisse moi tranquille au Brésil", "name": "Clément. J", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Si tu comptes et que y’a que neuf doigts de disponible, c’est que c’est mort", "name": "Sam. R", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "C’est grâce à moi que ton ex a commencé à te sucer", "name": "Adrien. V", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Je suis plus à l’aise au Glazard qu’en messe", "name": "Marg. H", "loc": "Paris", "cat1": "Mention Honorifique", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "On fait after ou ? Ça va très vite entre nous", "name": "Mathilde. R", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Tu me détestes quand tu dors, mais si t’es réveillé ça devrait aller", "name": "Mathilde. R", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Ça s’épelle comme je les roules", "name": "Alex. P", "loc": "Paris", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Quitte à me prendre une cuite autant qu’elle soit chère", "name": "Alex. P", "loc": "Paris", "cat1": "Mention Honorifique", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Il s’est tabassé le Bazouzou", "name": "Hugo. F -  BNP", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Un joueur de tennis avec des poils au fesses ça s’appelle Gaël MonSIF", "name": "Étienne. M", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Les handicapés au début j’avais du mal, maintenant plus ça va plus je m’en fou", "name": "Alex. P", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "T’as besoin de meuf que pour te vider les couilles, et en ce moment t’as pas envie de te vider les couilles", "name": "Clement. J", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Le premier avantage de la toge, c’est qu’on ne voit pas quand tu bandes", "name": "Étienne. M", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "", "q": "Ce soir je m’échoue sur un rocher", "name": "Alex. P", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "2024-04-22 23:42:26.734000", "q": "Il m’a pas brisé le cul, mais le coeur", "name": "Diane. B", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "2024-04-25 18:40:54.061000", "q": "Toute époque est belle à vivre tant que l’on vie avec son temps", "name": "Alex. P", "loc": "Paris", "cat1": "Classy", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "2024-04-29 20:54:06.480000", "q": "Quand t’accuses le premier, c’est que c’est toi qui a pété", "name": "Alex. P", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-07 20:11:29.054000", "q": "Parce que nos neurones couchent trop souvent ensembles, à minima éduquons les", "name": "Alex. P", "loc": "Paris", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-08 21:30:49.567000", "q": "Un pantalon ça sert à t'emballer le cul", "name": "Adrien. N", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-08 22:11:51.697000", "q": "J’ai l’impression de me prendre une déchirure anale du cerveau", "name": "Adrien. N", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-09 23:35:57.075000", "q": "Je suis pas royaliste mais je considère que la moitié des français ne devraient pas avoir le droit de vote", "name": "Samuel. R", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-10 20:16:45.274000", "q": "La base d’une relation c’est la communication. C’est juste un peu plus long quand t’es bègue", "name": "Alex. P", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-13 21:08:26.714000", "q": "Tu penses que c’est l’univers qui fait que ça foire, alors que c’est juste moi qui fout la merde", "name": "Adrien. N", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-14 01:14:26.925000", "q": "Va parler triangle avec tes autres potes qui finiront pauvres et revient me voir pour du cubique", "name": "Adrien. N", "loc": "Paris", "cat1": "Absurde", "cat2": "", "alc": "", "ctx": "", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-18 00:43:52.608000", "q": "La Normandie il faut faire simple pour boire", "name": "Valentin. F", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "Oui", "ctx": "Bar Paris", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-19 23:44:06.144000", "q": "Maman est un beau saumon", "name": "Alex. P", "loc": "Paris", "cat1": "Absurde", "cat2": "Mention Honorifique", "alc": "Non", "ctx": "Bar Paris vers St. Paul", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-20 20:08:29.472000", "q": "Kirikou n’est pas grand mais on va virer 15% de l’effectif", "name": "Adrien. N", "loc": "Paris", "cat1": "Absurde", "cat2": "Raciste", "alc": "Non", "ctx": "Dans la coloc après avoir bitché sur la gauche et les VC", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-22 21:33:47.808000", "q": "Ta sœur ça compte pour tous les autres sauf pour toi", "name": "Étienne. M", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "Oui", "ctx": "Verre avec Mégane et Etienne", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-22 22:55:07.680000", "q": "Espagne - Chine au basket pour les JO c'est 50€. Pour ce prix la autant que je joue", "name": "Adrien. N", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "Non", "ctx": "Colocation", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-23 11:49:06.816000", "q": "Il n'y a pas plus belle preuve d'amour que de reposter sa femme sur linkedin", "name": "Alex. P", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "Non", "ctx": "Colocation", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-23 21:22:11.424000", "q": "Cette année j’ai encore fait de la merde, l’année prochaine je me dépasse", "name": "Alex. P", "loc": "Paris", "cat1": "Absurde", "cat2": "Mention Honorifique", "alc": "Non", "ctx": "Coup de fil préparation voyage Édimbourg", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-24 20:23:56.544000", "q": "Du point de vue de l’Europe : Qu’est-ce qu’un enfant, sinon une manière de préparer les croisades du 22eme siècle ?", "name": "Adrien. N", "loc": "Paris", "cat1": "Absurde", "cat2": "", "alc": "Non", "ctx": "Colocation", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-24 23:02:56.832000", "q": "T’arrives à être narcissique sur les blagues des autres", "name": "Adrien. N", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "Non", "ctx": "Verre avec Sam", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-25 01:10:52.608000", "q": "Bourré mais pas décultivé", "name": "Adrien. N", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "Oui", "ctx": "Retour vers la coloc", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-25 01:18:14.976000", "q": "L’important c’est pas le recto ni le verso de la feuille, c’est que Mein Kampf ne soit pas écrit sur toi", "name": "Adrien. N", "loc": "Paris", "cat1": "Absurde", "cat2": "", "alc": "Oui", "ctx": "Dernier verre avant de rentrer", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-26 19:26:00.672000", "q": "Oh vous savez la route vers le bonheur se prend en sens interdit", "name": "Clément. B", "loc": "Paris", "cat1": "Classy", "cat2": "", "alc": "", "ctx": "Ça parle automobile entre nous nespa", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-27 02:54:59.328000", "q": "C’est plus facile d’être en paix avec soi-même quand tu dois guider quelqu’un d’autre", "name": "Elisa. P", "loc": "Lyon", "cat1": "Classy", "cat2": "Mention Honorifique", "alc": "Non", "ctx": "Discussion balcon après coaching pour aller aux oraux d’écoles de co", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-27 03:34:23.232000", "q": "On est le porte-parole de sa propre voix", "name": "Alex. P", "loc": "Lyon", "cat1": "Classy", "cat2": "", "alc": "Non", "ctx": "Idem que phrase précédente (balcon Elisa)", "wam": ""}, {"vol": "Volume 2", "date": "2024-05-31 23:56:18.816000", "q": "Si j’étais pédophile, j’irais au McDo en Écosse", "name": "Hugo. C", "loc": "Édimbourg", "cat1": "Beauf", "cat2": "", "alc": "Oui", "ctx": "Voyage en Écosse", "wam": ""}, {"vol": "Volume 2", "date": "2024-06-01 22:06:22.176000", "q": "Il vaut mieux avoir perdu la vue que ne l’avoir jamais eu", "name": "Hugo. C", "loc": "Édimbourg", "cat1": "Classy", "cat2": "", "alc": "Oui", "ctx": "Ça mate des culs au bar", "wam": ""}, {"vol": "Volume 2", "date": "2024-06-01 22:54:19.296000", "q": "Ta femme le clown", "name": "Hugo. C/Alex. P", "loc": "Édimbourg", "cat1": "Neutre", "cat2": "", "alc": "Oui", "ctx": "Bouffon va", "wam": ""}, {"vol": "Volume 2", "date": "2024-06-05 02:01:35.616000", "q": "Début Juillet je prends de la drogue dans le salon", "name": "Adrien. N", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "Non", "ctx": "Colocation", "wam": ""}, {"vol": "Volume 2", "date": "2024-06-05 23:59:40.128000", "q": "Tu serais un bon trou de balle pour un ours", "name": "Hugo. C", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "Oui", "ctx": "Verre café des anges", "wam": ""}, {"vol": "Volume 2", "date": "2024-06-06 22:07:16.608000", "q": "Brillant un instant, inutile le reste du temps", "name": "Alex. P", "loc": "Paris", "cat1": "Neutre", "cat2": "Absurde", "alc": "Non", "ctx": "Verre en terrasse", "wam": ""}, {"vol": "Volume 2", "date": "2024-06-06 23:57:36.576000", "q": "En moins de 10 minutes tu m’as donné envie qu’il y ai un tome 2 à Mein Kampf", "name": "Alex. P", "loc": "Paris", "cat1": "Neutre", "cat2": "", "alc": "Non", "ctx": "Coloration", "wam": ""}, {"vol": "Volume 2", "date": "2024-06-07 00:08:59.136000", "q": "T’as inventé l’entité pas remarquable", "name": "Adrien. N", "loc": "Paris", "cat1": "Absurde", "cat2": "", "alc": "Non", "ctx": "Colocation", "wam": ""}, {"vol": "Volume 2", "date": "2024-06-13 22:20:49.632000", "q": "C’est pour ça Hugo que tu baises personnes", "name": "Julie. L", "loc": "Vincennes", "cat1": "Beauf", "cat2": "", "alc": "Oui", "ctx": "Bar", "wam": ""}, {"vol": "Volume 2", "date": "2024-06-26 21:52:38.784000", "q": "La beauté est éphémère, son esprit ne l’est pas", "name": "Hugo. C", "loc": "Paris", "cat1": "Classy", "cat2": "", "alc": "Oui", "ctx": "Bar", "wam": ""}, {"vol": "Volume 2", "date": "2024-07-04 20:00:48.096000", "q": "Comme on dit, ce sont les gros bateaux qui amènent aux gros igloos", "name": "Hugo. C", "loc": "Paris / Les Sables d’Olonne", "cat1": "Absurde", "cat2": "", "alc": "Non", "ctx": "Je suis aux sables, il cherche une meuf qui a un chalet à la mer", "wam": ""}, {"vol": "Volume 2", "date": "2024-07-07 16:38:00.384000", "q": "Je sais pas qui entre toi et ta main cassée, et mon papi qui a été déporté, est la plus grande victime", "name": "Romain. O", "loc": "Les Sables d’Olonne / Lisieux", "cat1": "Raciste", "cat2": "", "alc": "Non", "ctx": "FaceTime avec Hugo", "wam": ""}, {"vol": "Volume 2", "date": "2024-07-08 17:40:29.280000", "q": "Pour moi le golf c’est comme le cul : à la fin t’es pas fatigué mais t’as utilisé tes doigts", "name": "Samuel. R", "loc": "Paris", "cat1": "Beauf", "cat2": "", "alc": "Non", "ctx": "Coca café", "wam": ""}, {"vol": "Volume 2", "date": "2024-07-11 19:24:51.552000", "q": "J’étais un bon médiocre", "name": "Hugo. C", "loc": "Les Sables d’Olonne", "cat1": "Absurde", "cat2": "", "alc": "Non", "ctx": "Y'en a pas", "wam": ""}, {"vol": "Volume 2", "date": "2024-07-11 19:25:20.064000", "q": "Les goûts et la mauvaise couleur", "name": "Hugo. C", "loc": "Les Sables d’Olonne", "cat1": "Raciste", "cat2": "", "alc": "Non", "ctx": "Y'en a pas", // ═══════════════════════════════════════════════
//  REACTIVE STORE FACTORY
// ═══════════════════════════════════════════════
function createStore(cfg) {
  const cm = cfg.colMap;
  const store = Vue.reactive({
    allData: [],
    filtered: [],
    currentItem: null,
    shuffleQueue: [],
    sessionHistory: [],
    favorites: JSON.parse(localStorage.getItem(cfg.storagePrefix + '_favs') || '[]'),
    activeFilters: {},
    dataLoaded: false,
    statsDirty: true,
    gameScore: 0, gameStreak: 0,
    gameBest: parseInt(localStorage.getItem(cfg.storagePrefix + '_game_best') || '0'),

    // Methods
    initData(data) {
      this.allData = data.filter(r => getCol(r, cm.text));
      this.filtered = [...this.allData];
      this.dataLoaded = true;
      // Init filters
      const def = { search: '' };
      cfg.filters.forEach(f => def[f.key] = []);
      try {
        const saved = JSON.parse(localStorage.getItem(cfg.storagePrefix + '_filters'));
        if (saved) Object.assign(def, saved);
      } catch(e) {}
      this.activeFilters = def;
      // Load history
      try {
        const saved = JSON.parse(localStorage.getItem(cfg.storagePrefix + '_history') || '[]');
        this.sessionHistory = saved.slice(0, 20).map(e => (e && e.ts !== undefined && e.q) ? e : { q: e, ts: 0 });
      } catch(e) { this.sessionHistory = []; }
      this.buildQueue();
      this.applyFilters();
    },
    buildQueue() {
      this.shuffleQueue = [...this.filtered];
      for (let i = this.shuffleQueue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [this.shuffleQueue[i], this.shuffleQueue[j]] = [this.shuffleQueue[j], this.shuffleQueue[i]];
      }
    },
    getNext() {
      if (!this.filtered.length) return null;
      if (!this.shuffleQueue.length) this.buildQueue();
      const item = this.shuffleQueue.pop();
      this.currentItem = item;
      this.sessionHistory.unshift({ q: item, ts: Date.now() });
      if (this.sessionHistory.length > 20) this.sessionHistory.length = 20;
      localStorage.setItem(cfg.storagePrefix + '_history', JSON.stringify(this.sessionHistory));
      return item;
    },
    applyFilters() {
      const af = this.activeFilters;
      this.filtered = this.allData.filter(row => {
        for (const f of cfg.filters) {
          const vals = af[f.key];
          if (vals && vals.length && !vals.includes(getCol(row, cm[f.col]))) return false;
        }
        if (af.search) {
          const hay = (getCol(row, cm.text) + ' ' + (cm.context ? getCol(row, cm.context) : '')).toLowerCase();
          if (!hay.includes(af.search)) return false;
        }
        return true;
      });
      this.buildQueue();
      this.statsDirty = true;
    },
    toggleFilter(key, val) {
      const arr = this.activeFilters[key];
      const idx = arr.indexOf(val);
      if (idx === -1) arr.push(val); else arr.splice(idx, 1);
      this.applyFilters();
      localStorage.setItem(cfg.storagePrefix + '_filters', JSON.stringify(this.activeFilters));
    },
    resetFilters() {
      cfg.filters.forEach(f => this.activeFilters[f.key] = []);
      this.activeFilters.search = '';
      this.applyFilters();
      localStorage.removeItem(cfg.storagePrefix + '_filters');
    },
    getUniqueValues(colKey) {
      return [...new Set(this.allData.map(r => getCol(r, cm[colKey])).filter(Boolean))].sort();
    },
    _itemId(row) { return getCol(row, cm.text) + '|||' + getCol(row, cm.author) + '|||' + getCol(row, cm.ts); },
    isFav(row) { const id = this._itemId(row); return this.favorites.some(f => this._itemId(f) === id); },
    toggleFav(row) {
      const id = this._itemId(row);
      const idx = this.favorites.findIndex(f => this._itemId(f) === id);
      if (idx === -1) { this.favorites.push(row); } else { this.favorites.splice(idx, 1); }
      localStorage.setItem(cfg.storagePrefix + '_favs', JSON.stringify(this.favorites));
      return idx === -1;
    },
    removeHistoryItem(idx) {
      this.sessionHistory.splice(idx, 1);
      localStorage.setItem(cfg.storagePrefix + '_history', JSON.stringify(this.sessionHistory));
    },
    get filterCount() {
      let c = 0;
      for (const f of cfg.filters) c += (this.activeFilters[f.key] || []).length;
      return c;
    },
    getFrequency(colKey) {
      const freq = {};
      this.filtered.forEach(r => { const v = getCol(r, cm[colKey]); if (v) freq[v] = (freq[v] || 0) + 1; });
      return freq;
    },
    getDailyQuote() {
      const today = new Date();
      const dq = this.allData.filter(q => {
        const d = parseDate(getCol(q, cm.ts));
        return d && d.getMonth() === today.getMonth() && d.getDate() === today.getDate();
      });
      if (!dq.length) return null;
      const doy = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
      return dq[doy % dq.length];
    },
    addGameScore(correct) {
      if (correct) {
        this.gameScore++; this.gameStreak++;
        if (this.gameStreak > this.gameBest) {
          this.gameBest = this.gameStreak;
          localStorage.setItem(cfg.storagePrefix + '_game_best', String(this.gameBest));
        }
      } else this.gameStreak = 0;
    },
    resetGame() { this.gameScore = 0; this.gameStreak = 0; },
  });
  return store;
}

const RandomCard = {
  props: {
    store: { type: Object, required: true },
    config: { type: Object, required: true },
  },
  emits: ['open-filter'],
  setup(props, { emit }) {
    const animating = ref(false);
    const cm = props.config.colMap;

    const current = computed(() => props.store.currentItem);
    const text = computed(() => current.value ? getCol(current.value, cm.text) : '');
    const author = computed(() => current.value ? getCol(current.value, cm.author) : '');
    const location = computed(() => current.value ? getCol(current.value, cm.location) : '');
    const date = computed(() => current.value ? formatDate(getCol(current.value, cm.ts)) : '');
    const isFav = computed(() => current.value ? props.store.isFav(current.value) : false);

    const lineNum = computed(() => {
      if (!current.value) return '';
      const idx = props.store.filtered.indexOf(current.value) + 1 || '?';
      const total = props.store.filtered.length;
      return props.config.linePrefix + ' ' + String(idx).padStart(3, '0') + ' / ' + String(total).padStart(3, '0');
    });

    // Chips
    const chips = computed(() => {
      if (!current.value) return [];
      const c = [];
      const vol = cm.volume ? getCol(current.value, cm.volume) : '';
      if (vol) c.push({ icon: '📚', label: vol, type: 'vol' });
      const cat = cm.mainCat ? getCol(current.value, cm.mainCat) : '';
      if (cat) c.push({ icon: '🏷', label: cat, type: 'cat' });
      const ctx = cm.context ? getCol(current.value, cm.context) : '';
      if (ctx) c.push({ icon: '💬', label: 'voir le contexte', type: 'ctx', detail: ctx });
      return c;
    });

    const showContext = ref(false);
    const contextText = computed(() => {
      if (!current.value || !cm.context) return '';
      return getCol(current.value, cm.context);
    });

    function nextRandom() {
      animating.value = true;
      setTimeout(() => {
        props.store.getNext();
        showContext.value = false;
        setTimeout(() => animating.value = false, 50);
      }, 150);
    }

    function toggleFav() {
      if (!current.value) return;
      const added = props.store.toggleFav(current.value);
      showToast(added ? '♥️ Ajouté aux favoris' : '💔 Retiré des favoris');
    }

    function share() {
      if (!current.value) return;
      const full = '« ' + text.value + ' »\n— ' + author.value + (location.value ? ' · ' + location.value : '');
      if (navigator.share) {
        navigator.share({ title: props.config.label, text: full }).catch(() => {});
      } else {
        navigator.clipboard.writeText(full).then(() => showToast('📋 Copié')).catch(() => {});
      }
    }

    onMounted(() => {
      if (!current.value && props.store.dataLoaded) nextRandom();
    });

    return {
      current, text, author, location, date, isFav, lineNum,
      chips, showContext, contextText, animating,
      nextRandom, toggleFav, share,
    };
  },
  template: `
    <div class="quote-area">
      <div class="quote-center" :class="{ exiting: animating }">
        <span class="quote-mark">"</span>
        <p class="quote-text">{{ text }}<span class="cursor-blink"></span></p>
      </div>
      <div class="quote-bottom" :class="{ exiting: animating }">
        <div class="quote-line-num">{{ lineNum }}</div>
        <div class="quote-bottom-inner">
          <div class="quote-meta">
            <div class="meta-author">{{ author ? '— ' + author : '—' }}</div>
            <div class="meta-secondary">
              <span v-if="location">{{ location }}</span>
              <span v-if="date">{{ date }}</span>
            </div>
          </div>
          <div class="chips-row">
            <span v-for="chip in chips" :key="chip.type" 
              :class="['chip-badge', chip.type + '-badge']"
              @click="chip.type === 'ctx' ? showContext = !showContext : null" style="cursor:pointer">
              {{ chip.icon }} {{ chip.label }}
            </span>
          </div>
          <div v-if="showContext && contextText" class="details-panel open">
            <div class="detail-row"><span class="detail-icon">💬</span><span class="detail-label">Contexte</span><span class="detail-val">{{ contextText }}</span></div>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn-fav" @click="toggleFav" :title="isFav ? 'Retirer' : 'Ajouter aux favoris'">
        <span class="fav-icon" v-html="isFav ? '♥️' : '<i class=\'ph ph-heart-half\'></i>'"></span>
      </button>
      <button class="btn-random" @click="nextRandom">{{ config.randomBtnLabel }}</button>
      <button class="btn-share" @click="share" title="Partager">↗</button>
      <button class="btn-filter-toggle" @click="$emit('open-filter')" title="Filtres"><i class="ph ph-funnel"></i></button>
    </div>
  `

// ── Confetti burst ──
function spawnConfetti(container) {
  const colors = ['#7c6af7','#4ade80','#fbbf24','#f472b6','#22d3ee','#ef4444'];
  const el = document.createElement('div');
  el.className = 'confetti-container';
  for (let i = 0; i < 20; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = (10 + Math.random() * 80) + '%';
    c.style.top = (10 + Math.random() * 30) + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = (Math.random() * 0.3) + 's';
    c.style.transform = 'rotate(' + (Math.random()*360) + 'deg)';
    el.appendChild(c);
  }
  container.style.position = 'relative';
  container.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

const GAME_RANKS = [
  { name: 'Newbie', minXP: 0, emoji: '\ud83e\udd5a', desc: 'Fais tes premiers pas !' },
  { name: 'Connaisseur', minXP: 50, emoji: '\ud83d\udc23', desc: 'Tu commences \u00e0 conna\u00eetre tes potes !' },
  { name: 'Expert', minXP: 150, emoji: '\ud83e\uddd0', desc: 'Rien ne t\u2019\u00e9chappe !' },
  { name: 'Ma\u00eetre', minXP: 350, emoji: '\ud83e\udd85', desc: 'Tu es inarr\u00eatable !' },
  { name: 'L\u00e9gende', minXP: 700, emoji: '\ud83d\udc51', desc: 'L\u00e9gendaire. M\u00e9moire absolue.' },
];

const QuizGame = {
  props: { store: { type: Object, required: true }, config: { type: Object, required: true } },
  setup(props) {
    const cm = props.config.colMap;
    const mode = ref('who');
    const answered = ref(false);
    const currentQ = ref(null);
    const choices = ref([]);
    const shownText = ref('');
    const hiddenText = ref('');
    const userInput = ref('');
    const isCorrect = ref(false);
    const selectedAnswer = ref('');
    const bouncing = ref(false);
    const xpPopText = ref('');
    const gameLog = ref([]);

    const correctAuthor = computed(() => currentQ.value ? getCol(currentQ.value, cm.author) : '');
    const itemLocation = computed(() => currentQ.value ? getCol(currentQ.value, cm.location) : '');
    const quoteText = computed(() => currentQ.value ? getCol(currentQ.value, cm.text) : '');
    const itemDate = computed(() => currentQ.value ? formatDate(getCol(currentQ.value, cm.ts)) : '');
    const itemVol = computed(() => currentQ.value && cm.volume ? getCol(currentQ.value, cm.volume) : '');
    const itemMainCat = computed(() => currentQ.value && cm.mainCat ? getCol(currentQ.value, cm.mainCat) : '');
    const itemSecondCat = computed(() => currentQ.value && cm.secondCat ? getCol(currentQ.value, cm.secondCat) : '');
    const itemAlcohol = computed(() => currentQ.value && cm.alcohol ? getCol(currentQ.value, cm.alcohol) : '');
    const isAlcYes = computed(() => /oui|yes|true/i.test(itemAlcohol.value));
    const itemCtx = computed(() => currentQ.value && cm.context ? getCol(currentQ.value, cm.context) : '');
    const rank = computed(() => { var r = GAME_RANKS[0]; GAME_RANKS.forEach(function(s) { if (props.store.gameXP >= s.minXP) r = s; }); return r; });
    const nextRank = computed(() => { for (var i = 0; i < GAME_RANKS.length; i++) { if (props.store.gameXP < GAME_RANKS[i].minXP) return GAME_RANKS[i]; } return null; });
    const xpPct = computed(() => { if (!nextRank.value) return 100; return Math.round(((props.store.gameXP - rank.value.minXP) / (nextRank.value.minXP - rank.value.minXP)) * 100); });

    function setMode(m) { mode.value = m; props.store.resetGame(); nextRound(); }
    function nextRound() {
      answered.value = false; selectedAnswer.value = ''; isCorrect.value = false; userInput.value = '';
      var pool = props.store.filtered.length >= 4 ? props.store.filtered : props.store.allData;
      if (pool.length < 4) { currentQ.value = null; return; }
      currentQ.value = pool[Math.floor(Math.random() * pool.length)];
      if (mode.value === 'who') buildWho(pool); else buildFinish();
    }
    function buildWho(pool) {
      var correct = getCol(currentQ.value, cm.author);
      var all = [...new Set(pool.map(function(r) { return getCol(r, cm.author); }).filter(Boolean))];
      var wrong = all.filter(function(a) { return a !== correct; }).sort(function() { return Math.random()-0.5; }).slice(0,3);
      choices.value = [correct].concat(wrong).sort(function() { return Math.random()-0.5; });
    }
    function buildFinish() {
      var text = getCol(currentQ.value, cm.text);
      var words = text.split(/\s+/);
      var cut = Math.max(2, Math.ceil(words.length * 0.55));
      shownText.value = words.slice(0, cut).join(' ');
      hiddenText.value = words.slice(cut).join(' ');
    }
    function showXPPop(amount) {
      xpPopText.value = '+' + amount + ' XP';
      setTimeout(function() { xpPopText.value = ''; }, 1500);
      bouncing.value = true;
      setTimeout(function() { bouncing.value = false; }, 500);
    }
    function addLog(icon, text, xp) {
      var now = new Date();
      var time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      gameLog.value = [{ icon:icon, text:text, xp:xp, time:time }].concat(gameLog.value.slice(0,7));
    }
    function answerWho(author) {
      if (answered.value) return;
      answered.value = true; selectedAnswer.value = author;
      var correct = getCol(currentQ.value, cm.author);
      isCorrect.value = author === correct;
      props.store.addGameScore(isCorrect.value);
      if (isCorrect.value) {
        var xpG = 10 + Math.min(props.store.gameStreak * 2, 20);
        props.store.addGameXP(xpG); showXPPop(xpG);
        addLog('\u2705', correct, xpG);
        var gc = document.querySelector('.game-pet-card'); if (gc) spawnConfetti(gc);
      } else { addLog('\u274c', correct, 0); }
    }
    function submitFinish() {
      if (answered.value) return; answered.value = true;
      var correctWords = hiddenText.value.toLowerCase().split(/\s+/);
      var userWords = userInput.value.trim().toLowerCase().split(/\s+/);
      var matches = 0;
      correctWords.forEach(function(w) { if (userWords.some(function(uw) { return uw===w||(w.length>3&&uw.includes(w.substring(0,Math.ceil(w.length*0.7)))); })) matches++; });
      isCorrect.value = correctWords.length > 0 && (matches/correctWords.length) >= 0.5;
      props.store.addGameScore(isCorrect.value);
      var author = getCol(currentQ.value, cm.author);
      if (isCorrect.value) {
        var xpG = 15 + Math.min(props.store.gameStreak * 2, 20);
        props.store.addGameXP(xpG); showXPPop(xpG);
        addLog('\u2705', author, xpG);
        var gc = document.querySelector('.game-pet-card'); if (gc) spawnConfetti(gc);
      } else { addLog('\u274c', author, 0); }
    }

    return { mode, answered, currentQ, choices, shownText, hiddenText, userInput, isCorrect, selectedAnswer,
      correctAuthor, itemLocation, quoteText, itemDate, itemVol, itemMainCat, itemSecondCat, itemAlcohol, isAlcYes, itemCtx,
      rank, nextRank, xpPct, bouncing, xpPopText, gameLog, setMode, nextRound, answerWho, submitFinish };
  },
  template: `
    <div style="display:flex;flex-direction:column;flex:1;min-height:0;overflow-y:auto">
      <div class="game-inner">
        <div class="game-pet-card">
          <div class="game-pet-glow"></div>
          <div v-if="xpPopText" class="game-xp-pop" :key="xpPopText">{{ xpPopText }}</div>
          <span class="game-pet-emoji" :class="{bounce: bouncing}">{{ rank.emoji }}</span>
          <div class="game-rank-name">{{ rank.name }}</div>
          <div class="game-rank-desc">{{ rank.desc }}</div>
          <div class="game-xp-section">
            <div class="game-xp-labels"><span>{{ store.gameXP }} XP</span><span>{{ nextRank ? nextRank.minXP+' XP pour '+nextRank.name : 'RANG MAX' }}</span></div>
            <div class="game-xp-bar"><div class="game-xp-fill" :style="{width: xpPct+'%'}"></div></div>
            <div class="game-xp-percent">{{ nextRank ? xpPct+'% vers '+nextRank.name : 'MAX LEVEL' }}</div>
          </div>
        </div>
        <div class="game-stats-row">
          <div class="game-stat-card"><div class="game-stat-val">{{ store.gameScore }}</div><div class="game-stat-label">Score</div></div>
          <div class="game-stat-card"><div class="game-stat-val" style="color:#fbbf24">{{ store.gameStreak }}</div><div class="game-stat-label">Serie</div></div>
          <div class="game-stat-card"><div class="game-stat-val" style="color:var(--accent)">{{ store.gameBest }}</div><div class="game-stat-label">Record</div></div>
        </div>
        <div class="game-challenge-card" v-if="currentQ">
          <div class="game-challenge-label">{{ mode==='who' ? '// qui a dit ?' : '// finis la phrase' }}</div>
          <div class="game-challenge-quote" v-if="mode==='who'||answered">{{ quoteText }}</div>
          <div class="game-challenge-quote" v-else>{{ shownText }} <span class="game-blank">&#8230;</span></div>
          <div v-if="!answered">
            <div class="game-choices" v-if="mode==='who'"><button v-for="c in choices" :key="c" class="game-choice" @click="answerWho(c)">{{ c }}</button></div>
            <div class="game-input-area" v-else><input class="game-input" v-model="userInput" placeholder="Completez..." @keydown.enter="submitFinish" /><button class="game-validate-btn" @click="submitFinish">Valider</button></div>
          </div>
          <div v-if="answered" style="margin-top:16px">
            <div class="game-result-badge"><span :style="{color:isCorrect?'#4ade80':'#ef4444'}">{{ isCorrect ? 'Bien joue !' : 'Rate !' }}</span><template v-if="mode==='finish'"><br><span class="label">Reponse : </span><span class="answer">{{ hiddenText }}</span></template></div>
            <div class="game-reveal-bottom">
              <div class="quote-meta"><div class="meta-author">{{ correctAuthor }}</div><div class="meta-secondary"><span v-if="itemLocation">{{ itemLocation }}</span><span v-if="itemDate">{{ itemDate }}</span></div></div>
              <div class="chips-row" v-if="itemVol||itemMainCat||itemAlcohol"><span v-if="itemVol" class="info-badge vol-badge">{{ itemVol }}</span><span v-if="itemMainCat" class="info-badge cat-badge">{{ itemMainCat }}</span></div>
              <div v-if="itemCtx" class="detail-row"><span class="detail-label">Contexte</span><span class="detail-value">{{ itemCtx }}</span></div>
            </div>
            <button class="game-next-btn" @click="nextRound">Une autre chef !</button>
          </div>
        </div>
        <div class="game-challenge-card" v-else><div class="game-challenge-quote">Pas assez de phrases.</div></div>
        <div class="game-log-card">
          <div class="game-log-title">// historique</div>
          <div v-if="gameLog.length===0" class="game-log-empty">Aucune reponse encore.</div>
          <div v-for="(item,i) in gameLog" :key="i" class="game-log-item"><span class="log-icon">{{ item.icon }}</span><span class="log-author">{{ item.text }}</span><span class="log-xp" v-if="item.xp">+{{ item.xp }}</span><span class="log-time">{{ item.time }}</span></div>
        </div>
      </div>
      <div class="game-mode-bar"><button class="game-mode-btn" :class="{active:mode==='who'}" @click="setMode('who')">Qui a dit ?</button><button class="game-mode-btn" :class="{active:mode==='finish'}" @click="setMode('finish')">Finis la phrase</button></div>
    </div>
  `
};

const FilterPanel = {
  props: {
    store: { type: Object, required: true },
    config: { type: Object, required: true },
    visible: { type: Boolean, default: false },
  },
  emits: ['close'],
  setup(props, { emit }) {
    const expanded = ref({});

    const filterGroups = computed(() => {
      return props.config.filters.map(f => ({
        key: f.key,
        label: f.label,
        values: props.store.getUniqueValues(f.col),
        selected: props.store.activeFilters[f.key] || [],
      }));
    });

    const search = computed({
      get: () => props.store.activeFilters.search || '',
      set: (v) => {
        props.store.activeFilters.search = v.toLowerCase();
        props.store.applyFilters();
      }
    });

    const filterCount = computed(() => props.store.filterCount);
    const totalResults = computed(() => props.store.filtered.length);

    function toggle(key, val) {
      props.store.toggleFilter(key, val);
    }

    function isActive(key, val) {
      return (props.store.activeFilters[key] || []).includes(val);
    }

    function toggleExpand(key) {
      expanded.value[key] = !expanded.value[key];
    }

    function isExpanded(key) {
      return !!expanded.value[key];
    }

    function reset() {
      props.store.resetFilters();
    }

    function close() {
      emit('close');
    }

    return { filterGroups, search, filterCount, totalResults, toggle, isActive, toggleExpand, isExpanded, reset, close };
  },
  template: `
    <div class="filter-overlay" :class="{ open: visible }" @click.self="close">
      <div class="filter-panel" :class="{ open: visible }">
        <div class="filter-handle" @click="close"></div>
        <div class="filter-header-bar">
          <h3 class="filter-title"><i class="ph ph-funnel"></i> Filtres</h3>
          <button class="filter-badge" v-if="filterCount > 0" @click="reset">
            {{ filterCount }} actif{{ filterCount > 1 ? 's' : '' }} — réinitialiser
          </button>
        </div>
        <div class="filter-results-count">{{ totalResults }} résultat{{ totalResults !== 1 ? 's' : '' }}</div>

        <div class="filter-search-wrap">
          <input class="filter-search" type="text" placeholder="Rechercher dans les phrases..." 
            :value="search" @input="search = $event.target.value" />
        </div>

        <div class="filter-scroll">
          <div v-for="group in filterGroups" :key="group.key" class="filter-cat-block">
            <div class="filter-cat-header" @click="toggleExpand(group.key)">
              <span><span v-html="group.label"></span> <span v-if="group.selected.length" class="filter-cat-count">({{ group.selected.length }})</span></span>
              <span class="filter-cat-arrow" :class="{ expanded: isExpanded(group.key) }">▸</span>
            </div>
            <div class="filter-chips-inner" v-show="isExpanded(group.key)">
              <button v-for="val in group.values" :key="val"
                class="chip" :class="{ active: isActive(group.key, val) }"
                @click="toggle(group.key, val)">{{ val }}</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `
};

const StatsView = {
  props: {
    store: { type: Object, required: true },
    config: { type: Object, required: true },
    active: { type: Boolean, default: false },
  },
  setup(props) {
    const cm = props.config.colMap;
    const cfg = props.config;
    const chartJsLoaded = ref(false);
    const charts = {};
    const loading = ref(false);

    // ── Overview stats ──
    const totalCount = computed(() => props.store.filtered.length);
    const authorCount = computed(() => new Set(props.store.filtered.map(r => getCol(r, cm.author)).filter(Boolean)).size);

    const topLocation = computed(() => {
      const freq = props.store.getFrequency('location');
      const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]);
      return sorted[0] ? sorted[0][0] : '—';
    });

    const topCategory = computed(() => {
      if (!cm.mainCat) return '—';
      const freq = props.store.getFrequency('mainCat');
      const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]);
      return sorted[0] ? sorted[0][0] : '—';
    });

    // ── Daily quote ──
    const dailyQuote = computed(() => props.store.getDailyQuote());
    const dailyText = computed(() => dailyQuote.value ? getCol(dailyQuote.value, cm.text) : '');
    const dailyAuthor = computed(() => dailyQuote.value ? getCol(dailyQuote.value, cm.author) : '');
    const dailyYear = computed(() => {
      if (!dailyQuote.value) return '';
      const d = parseDate(getCol(dailyQuote.value, cm.ts));
      return d ? d.getFullYear() : '';
    });
    const dailyDate = computed(() => {
      const today = new Date();
      return today.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
    });

    // ── Charts ──
    async function loadChartJS() {
      if (chartJsLoaded.value) return;
      if (window.Chart) { chartJsLoaded.value = true; return; }
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
        s.onload = () => { chartJsLoaded.value = true; resolve(); };
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    function destroyChart(key) {
      if (charts[key]) { charts[key].destroy(); delete charts[key]; }
    }

    function makeChart(canvasId, type, labels, data, label, colors) {
      const ctx = document.getElementById(canvasId);
      if (!ctx) return;
      destroyChart(canvasId);
      charts[canvasId] = new Chart(ctx, {
        type,
        data: {
          labels,
          datasets: [{ label, data, backgroundColor: colors || 'rgba(124,106,247,0.5)', borderColor: colors || '#7c6af7', borderWidth: 1 }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: type === 'bar' ? {
            y: { beginAtZero: true, ticks: { color: '#8b8fac', font: { size: 10 } }, grid: { color: '#252a42' } },
            x: { ticks: { color: '#8b8fac', font: { size: 9 }, maxRotation: 45 }, grid: { display: false } }
          } : undefined,
        }
      });
    }

    async function buildCharts() {
      if (!props.store.filtered.length) return;
      if (!props.store.statsDirty && chartJsLoaded.value) return;
      loading.value = true;

      try { await loadChartJS(); } catch (e) {
        showToast('Impossible de charger les graphiques');
        loading.value = false;
        return;
      }

      await nextTick();

      // Author chart
      const authorFreq = props.store.getFrequency('author');
      const authorSorted = Object.entries(authorFreq).sort((a, b) => b[1] - a[1]).slice(0, 10);
      if (authorSorted.length) {
        makeChart('chart-authors-' + props.config.id, 'bar',
          authorSorted.map(a => a[0]), authorSorted.map(a => a[1]), 'Phrases');
      }

      // Category chart
      if (cm.mainCat) {
        const catFreq = props.store.getFrequency('mainCat');
        const catSorted = Object.entries(catFreq).sort((a, b) => b[1] - a[1]);
        const catColors = catSorted.map((_, i) => `hsl(${260 + i * 30}, 60%, 60%)`);
        if (catSorted.length) {
          makeChart('chart-cats-' + props.config.id, 'doughnut',
            catSorted.map(c => c[0]), catSorted.map(c => c[1]), 'Catégories', catColors);
        }
      }

      // Timeline chart
      const monthFreq = {};
      props.store.filtered.forEach(r => {
        const d = parseDate(getCol(r, cm.ts));
        if (d) {
          const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
          monthFreq[key] = (monthFreq[key] || 0) + 1;
        }
      });
      const months = Object.keys(monthFreq).sort();
      if (months.length > 1) {
        makeChart('chart-timeline-' + props.config.id, 'bar',
          months, months.map(m => monthFreq[m]), 'Phrases/mois');
      }

      props.store.statsDirty = false;
      loading.value = false;
    }

    watch(() => props.active, (val) => {
      if (val) buildCharts();
    });

    return {
      cfg,
      totalCount, authorCount, topLocation, topCategory,
      dailyQuote, dailyText, dailyAuthor, dailyYear, dailyDate,
      loading,
    };
  },
  template: `
    <div class="stats-scroll">
      <!-- Overview -->
      <div class="stat-overview">
        <div class="stat-mini"><div class="label">Total</div><div class="num">{{ totalCount }}</div></div>
        <div class="stat-mini"><div class="label">{{ cfg.labels?.author || 'Auteurs' }}</div><div class="num">{{ authorCount }}</div></div>
        <div class="stat-mini"><div class="label">Top lieu</div><div class="num" style="font-size:11px">{{ topLocation }}</div></div>
        <div class="stat-mini"><div class="label">Catégorie #1</div><div class="num" style="font-size:11px">{{ topCategory }}</div></div>
      </div>

      <!-- Daily -->
      <div class="stat-card" v-if="dailyQuote">
        <div class="stat-card-title">{{ cfg.labels?.daily || '📅 Phrase du jour' }} — {{ dailyDate }}</div>
        <div style="cursor:pointer;padding:8px 0" @click="$emit('show-item', dailyQuote)">
          <div style="font-style:italic;font-family:var(--font-body);font-size:13px;color:var(--text);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">
            « {{ dailyText }} »
          </div>
          <div style="font-size:11px;margin-top:4px">
            <span style="color:var(--accent)">{{ dailyAuthor }}</span>
            <span v-if="dailyYear" style="color:var(--text-dim);margin-left:6px">{{ dailyYear }}</span>
          </div>
        </div>
      </div>
      <div class="stat-card" v-else>
        <div class="stat-card-title">{{ cfg.labels?.daily || '📅 Phrase du jour' }} — {{ dailyDate }}</div>
        <div style="font-size:12px;color:var(--text-dim);padding:8px 0">Aucune donnée enregistrée ce jour</div>
      </div>

      <!-- Charts -->
      <div class="stat-card">
        <div class="stat-card-title">👤 Top auteurs</div>
        <div class="chart-wrap"><canvas :id="'chart-authors-' + config.id"></canvas></div>
      </div>
      <div class="stat-card" v-if="config.colMap.mainCat">
        <div class="stat-card-title">🏷 Catégories</div>
        <div class="chart-wrap" style="max-height:250px"><canvas :id="'chart-cats-' + config.id"></canvas></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-title">📈 Timeline</div>
        <div class="chart-wrap"><canvas :id="'chart-timeline-' + config.id"></canvas></div>
      </div>
    </div>
  `
};


// ═══════════════════════════════════════════════
//  SECTION VIEW
// ═══════════════════════════════════════════════
const SectionView = {
  components: { RandomCard, FilterPanel, StatsView, HistoryList, QuizGame, FavSheet },
  props: {
    store: { type: Object, required: true },
    config: { type: Object, required: true },
  },
  setup(props) {
    const tab = Vue.ref('quote');
    const filterOpen = Vue.ref(false);
    const favSheetOpen = Vue.ref(false);
    const tabs = [
      { id:'quote', icon:'<i class="ph ph-shuffle"></i>', label:'phrases' },
      { id:'stats', icon:'<i class="ph ph-chart-donut"></i>', label:'stats' },
      { id:'game', icon:'🧠', label:'jeu' },
      { id:'history', icon:'<i class="ph ph-clock-counter-clockwise"></i>', label:'log' },
    ];
    const favCount = Vue.computed(() => props.store.favorites.length);
    function setTab(t) { tab.value = t; }
    function showItem(q) { props.store.currentItem = q; tab.value = 'quote'; }
    function openFilter() { filterOpen.value = true; }
    return { tab, tabs, filterOpen, favSheetOpen, favCount, setTab, showItem, openFilter };
  },
  template: `
    <div class="section-view">
      <header class="header">
        <div class="header-title">// {{ config.label.toUpperCase() }}</div>
        <div class="header-actions">
          <button class="btn-fav-header" @click="favSheetOpen = true">
            <span class="btn-fav-header-label">Mes préfs<span v-if="favCount"> ({{ favCount }})</span></span>
            <span class="btn-fav-header-icon"><i class="ph ph-heart-half"></i></span>
          </button>
          <button class="btn-theme" onclick="toggleTheme()" title="Thème"><span class="theme-icon">☀️</span></button>
        </div>
      </header>
      <div class="screens-container">
        <div class="screen" :class="{active: tab==='quote'}"><RandomCard :store="store" :config="config" @open-filter="openFilter" /></div>
        <div class="screen" :class="{active: tab==='stats'}"><StatsView :store="store" :config="config" :active="tab==='stats'" @show-item="showItem" /></div>
        <div class="screen" :class="{active: tab==='game'}"><QuizGame :store="store" :config="config" /></div>
        <div class="screen" :class="{active: tab==='history'}"><HistoryList :store="store" :config="config" @show-item="showItem" /></div>
      </div>
      <nav class="bottom-nav">
        <button v-for="t in tabs" :key="t.id" class="nav-btn" :class="{active: tab===t.id}" @click="setTab(t.id)">
          <span class="nav-icon" v-html="t.icon"></span>{{ t.label }}
        </button>
      </nav>
      <FilterPanel :store="store" :config="config" :visible="filterOpen" @close="filterOpen = false" />
      <FavSheet :store="store" :config="config" :visible="favSheetOpen" @close="favSheetOpen = false" @show-item="showItem" />
    </div>
  `
};

// ═══════════════════════════════════════════════
//  ROOT APP
// ═══════════════════════════════════════════════
// ── Theme toggle (global) ──
function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.classList.add('light');
    document.querySelector('meta[name="theme-color"]').content = '#f5f5f7';
  } else {
    document.documentElement.classList.remove('light');
    document.querySelector('meta[name="theme-color"]').content = '#0d0f1a';
  }
}
(function() { const s = localStorage.getItem('qapp_theme'); if (s) applyTheme(s); })();

// ── Onboarding steps ──
const ONBOARD_STEPS = [
  { icon: '👋', title: 'Bienvenue !', text: 'Découvre ta collection de phrases mémorables. Voici un petit tour des features.' },
  { icon: '🎲', title: 'Phrases aléatoires', text: 'Appuie sur le bouton pour tirer une phrase au hasard dans chaque section.' },
  { icon: '📌', title: 'Favoris', text: 'Épingle tes phrases préfs avec 📌. Retrouve-les via le bouton 🤍 en haut.' },
  { icon: '🔍', title: 'Filtres', text: 'Filtre par auteur, catégorie, lieu… pour trouver exactement la phrase que tu cherches.' },
  { icon: '📊', title: 'Stats', text: 'Explore les tendances, top auteurs et la phrase du jour — différente chaque jour.' },
  { icon: '🧠', title: 'Le Jeu', text: '« Qui a dit ? » ou « Finis la phrase » — grimpe ton streak 🔥 et bats ton record ⭐.' },
  { icon: '🎤', title: '3 sections', text: 'Navigue entre Our Quotes, Mike Dyson et Mots Cools avec les onglets en haut.' },
  { icon: '☀️', title: 'Mode clair', text: 'Bascule le thème avec ☀️ dans le header. Ton choix est sauvegardé.' },
];

const app = Vue.createApp({
  components: { SectionView },
  setup() {
    const activeSection = Vue.ref('quotes');
    const stores = {};
    const sectionConfigs = {};

    SECTIONS.forEach(cfg => {
      stores[cfg.id] = createStore(cfg);
      sectionConfigs[cfg.id] = cfg;
      stores[cfg.id].initData(cfg.data);
    });

    function switchSection(id) {
      activeSection.value = id;
      document.documentElement.style.setProperty('--accent', SECTIONS.find(s => s.id === id).accentColor);
    }

    showToast(stores.quotes.allData.length + ' phrases chargées');

    // Theme
    const isLight = ref(document.documentElement.classList.contains('light'));
    const themeIcon = computed(() => isLight.value ? '🌙' : '☀️');
    function toggleTheme() {
      isLight.value = !isLight.value;
      const t = isLight.value ? 'light' : 'dark';
      localStorage.setItem('qapp_theme', t);
      applyTheme(t);
    }

    // Onboarding
    const showOnboard = ref(false);
    const obStep = ref(0);
    const obCurrent = computed(() => ONBOARD_STEPS[obStep.value]);
    const obIsLast = computed(() => obStep.value >= ONBOARD_STEPS.length - 1);
    function nextOb() {
      if (obIsLast.value) { endOb(); return; }
      obStep.value++;
    }
    function endOb() {
      showOnboard.value = false;
      localStorage.setItem('qapp_onboarded', '1');
    }
    // Trigger onboarding on first visit
    setTimeout(() => {
      if (!localStorage.getItem('qapp_onboarded')) showOnboard.value = true;
    }, 1500);


    // Popups
    const activePopup = ref(null);
    const popupQueue = [];
    const codeDigits = ref(['','','','','','']);
    const codeError = ref('');
    const installNoRemind = ref(false);
    const APP_VERSION = '3';
    const ACCESS_CODE = '751101';

    function queuePopup(id) { popupQueue.push(id); if (!activePopup.value) nextPopup(); }
    function nextPopup() { activePopup.value = popupQueue.length ? popupQueue.shift() : null; }
    function dismissPopup() { activePopup.value = null; setTimeout(nextPopup, 350); }

    function onCodeInput(i, ev) {
      codeDigits.value[i] = ev.target.value.replace(/\D/g, '');
      ev.target.value = codeDigits.value[i];
      if (codeDigits.value[i] && i < 5) {
        const inputs = document.querySelectorAll('#code-inputs input');
        if (inputs[i+1]) inputs[i+1].focus();
      }
      const code = codeDigits.value.join('');
      if (code.length === 6) {
        if (code === ACCESS_CODE) {
          localStorage.setItem('qapp_code_version', APP_VERSION);
          codeError.value = '';
          dismissPopup();
        } else {
          codeError.value = 'Code incorrect';
          codeDigits.value = ['','','','','',''];
          nextTick(() => { const inputs = document.querySelectorAll('#code-inputs input'); if (inputs[0]) inputs[0].focus(); });
        }
      }
    }
    function onCodeKeydown(i, e) {
      if (e.key === 'Backspace' && !codeDigits.value[i] && i > 0) {
        codeDigits.value[i-1] = '';
        nextTick(() => { const inputs = document.querySelectorAll('#code-inputs input'); if (inputs[i-1]) inputs[i-1].focus(); });
      }
    }
    function onCodePaste(e) {
      e.preventDefault();
      const p = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g, '');
      p.split('').slice(0,6).forEach((c,j) => codeDigits.value[j] = c);
    }
    function dismissInstall() {
      if (installNoRemind.value) localStorage.setItem('qapp_install_never', '1');
      dismissPopup();
    }

    // Boot popups
    setTimeout(() => {
      if (localStorage.getItem('qapp_code_version') !== APP_VERSION) queuePopup('code');
      if (!window.matchMedia('(display-mode: standalone)').matches && !window.navigator.standalone && !localStorage.getItem('qapp_install_never')) {
        setTimeout(() => queuePopup('install'), 4000);
      }
    }, 500);

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (nw) nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              showToast('🔄 Mise à jour disponible — rechargez');
              nw.postMessage('skipWaiting');
            }
          });
        });
      }).catch(err => console.warn('SW registration failed:', err));
    }

    return { activeSection, stores, sectionConfigs, switchSection, SECTIONS, activePopup, codeDigits, codeError, installNoRemind, onCodeInput, onCodeKeydown, onCodePaste, dismissInstall, isLight, themeIcon, toggleTheme, showOnboard, obStep, obCurrent, obIsLast, nextOb, endOb, ONBOARD_STEPS };
  },
  template: `
    <div class="app">
      <div class="section-tabs">
        <button v-for="s in SECTIONS" :key="s.id"
          class="section-tab" :class="{active: activeSection===s.id}"
          :style="activeSection===s.id ? {borderColor: s.accentColor, color: s.accentColor} : {}"
          @click="switchSection(s.id)">
          <span class="section-tab-icon">{{ s.icon }}</span>
          <span class="section-tab-label">{{ s.label }}</span>
        </button>
      </div>
      <template v-for="s in SECTIONS" :key="s.id">
        <SectionView v-show="activeSection===s.id" :store="stores[s.id]" :config="sectionConfigs[s.id]" />
      </template>

      <!-- Popup overlay -->
      <div class="popup-overlay" :class="{show: activePopup}">
        <div class="popup-card" :class="{show: activePopup==='code'}" v-if="activePopup==='code'">
          <div class="popup-icon">🔐</div>
          <div class="popup-title">Code d'accès</div>
          <div class="popup-text">Entrez le code à 6 chiffres</div>
          <div id="code-inputs" style="display:flex;gap:6px;justify-content:center;margin:14px 0">
            <input v-for="(d,i) in codeDigits" :key="i" type="tel" maxlength="1" inputmode="numeric"
              :value="codeDigits[i]" @input="onCodeInput(i,$event)" @keydown="onCodeKeydown(i,$event)" @paste="onCodePaste($event)"
              style="width:36px;height:44px;text-align:center;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--accent);font-family:var(--font-mono);font-size:18px;outline:none" />
          </div>
          <div v-if="codeError" style="color:#ef4444;font-size:11px;font-family:var(--font-mono)">{{ codeError }}</div>
        </div>
        <div class="popup-card" :class="{show: activePopup==='install'}" v-if="activePopup==='install'">
          <div class="popup-icon">📲</div>
          <div class="popup-title">Installer l'app</div>
          <div class="popup-text">Safari → Partager → Sur l'écran d'accueil</div>
          <label style="display:flex;gap:6px;align-items:center;font-size:11px;color:var(--text-dim);margin:8px 0;font-family:var(--font-mono)">
            <input type="checkbox" v-model="installNoRemind" /> Ne plus rappeler
          </label>
          <button class="popup-btn" @click="dismissInstall" style="padding:8px 20px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);font-family:var(--font-mono);font-size:11px;cursor:pointer">OK</button>
        </div>
      </div>
      <div class="toast" id="toast"></div>
      <div class="onboard-overlay" :class="{show: showOnboard}">
        <div class="onboard-card" :style="{transition: 'opacity 0.25s ease, transform 0.25s ease'}">
          <div class="onboard-icon">{{ obCurrent.icon }}</div>
          <div class="onboard-title">{{ obCurrent.title }}</div>
          <div class="onboard-text">{{ obCurrent.text }}</div>
          <div class="onboard-dots">
            <div v-for="(s,i) in ONBOARD_STEPS" :key="i" class="onboard-dot" :class="{active: i===obStep}"></div>
          </div>
          <div class="onboard-actions">
            <button class="onboard-skip" @click="endOb">Passer</button>
            <button class="onboard-next" @click="nextOb">{{ obIsLast ? "C'est parti ! 🎉" : 'Suivant →' }}</button>
          </div>
        </div>
      </div>
    </div>
  `
});
app.mount('#app');
</script>
</body>
</html>
